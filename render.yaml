services:
  - type: web
    name: ims-v1
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: DTVS_SECRET
        sync: false          # Set manually in Render dashboard (64 hex chars)
      - key: SESSION_SECRET
        sync: false          # Set manually in Render dashboard (>=64 chars)
      - key: BOOTSTRAP_ADMIN_USERNAME
        sync: false          # Optional first-run admin for empty Mongo DB
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false          # Optional first-run admin password
      - key: COOKIE_SAME_SITE
        value: lax           # Use none if frontend is on a different domain
      - key: MAIL_USER
        sync: false          # Optional — Gmail address for notifications
      - key: MAIL_PASS
        sync: false          # Optional — Gmail App Password
      - key: CLOUDINARY_CLOUD_NAME
        sync: false          # Optional — for file uploads
      - key: CLOUDINARY_API_KEY
        sync: false          # Optional — for file uploads
      - key: CLOUDINARY_API_SECRET
        sync: false          # Optional — for file uploads
